<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alfamart Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { 'alfa-red': '#E31837', 'alfa-blue': '#105fad' } } }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen flex items-center justify-center font-[Inter] bg-cover bg-center"
  style="background-image: url('{{ url_for('static', filename='assets/login_bg.png') }}')">

  <div class="bg-white w-full max-w-3xl rounded-2xl shadow-2xl flex overflow-hidden mx-4">

    <!-- Left: Form -->
    <div class="flex-1 p-10 flex flex-col justify-center">
      <img src="{{ url_for('static', filename='assets/Alfamart.webp') }}" alt="Alfamart" class="h-10 mb-6">
      <h2 class="text-2xl font-semibold text-gray-800 mb-6">Welcome Back!</h2>

      {% if error %}
      <p class="text-red-500 text-sm mb-4 bg-red-50 border border-red-200 rounded-md px-3 py-2">{{ error }}</p>
      {% endif %}

      <form action="{{ url_for('login_post') }}" method="POST" class="flex flex-col gap-4">
        <div>
          <label class="block text-sm text-gray-700 mb-1">Employee ID</label>
          <input type="text" name="employeeId" placeholder="Input Your Employee ID" required
            class="w-full px-4 py-3 border border-gray-300 bg-gray-100 rounded-md text-sm outline-none focus:border-alfa-blue focus:bg-white transition">
        </div>
        <div>
          <label class="block text-sm text-gray-700 mb-1">PIN</label>
          <input type="password" name="pin" placeholder="Input Your PIN" required
            class="w-full px-4 py-3 border border-gray-300 bg-gray-100 rounded-md text-sm outline-none focus:border-alfa-blue focus:bg-white transition">
        </div>
        <button type="submit"
          class="w-full py-3 bg-alfa-blue text-white rounded-md font-medium text-sm hover:bg-blue-800 transition mt-2">
          Login
        </button>
        <button type="button" onclick="alert('Redirecting to PIN Reset page...')"
          class="w-full py-3 border border-alfa-blue text-alfa-blue rounded-md font-medium text-sm hover:bg-blue-50 transition">
          Reset PIN
        </button>
      </form>
    </div>

    <!-- Right: QR -->
    <div class="flex-1 flex flex-col items-center justify-center border-l border-gray-100 p-10">
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=AlfamartLoginExample"
        alt="QR Code" class="w-44 h-44 mb-5">
      <h3 class="text-xs font-semibold tracking-widest text-gray-700 uppercase mb-5">Login with QRCode</h3>
      <div class="flex flex-col gap-3 w-full max-w-xs text-sm text-gray-700">
        <div class="flex items-start gap-3">
          <span class="w-6 h-6 rounded-full bg-gray-200 text-gray-600 flex items-center justify-center text-xs font-bold shrink-0">1</span>
          <p>Open <strong>Alfaone Application</strong></p>
        </div>
        <div class="flex items-start gap-3">
          <span class="w-6 h-6 rounded-full bg-gray-200 text-gray-600 flex items-center justify-center text-xs font-bold shrink-0">2</span>
          <p>Go to the 🔒 <strong>Login With QRCode</strong> menu</p>
        </div>
        <div class="flex items-start gap-3">
          <span class="w-6 h-6 rounded-full bg-gray-200 text-gray-600 flex items-center justify-center text-xs font-bold shrink-0">3</span>
          <p>Scan this <strong>QRCode</strong></p>
        </div>
      </div>
    </div>

  </div>
</body>
</html>
